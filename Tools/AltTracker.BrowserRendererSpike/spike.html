<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AltTracker Browser Renderer Spike</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #2e3440;
      overflow: auto;
      color: #f8f8f2;
      font-family: Segoe UI, Tahoma, sans-serif;
    }
    #debugBanner {
      position: fixed;
      top: 8px;
      left: 8px;
      z-index: 50;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid #5bc0de;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 14px;
    }
    #stage {
      width: 512px;
      height: 512px;
      margin: 56px 16px 16px 16px;
      background: #4f5b66;
      position: relative;
      border: 4px solid #ffd54f;
      box-shadow: 0 0 0 4px #1b1f27 inset;
    }
    #model_3d {
      width: 512px;
      height: 512px;
    }
    #overlayStatus {
      position: absolute;
      left: 8px;
      bottom: 8px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid #9ccc65;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 13px;
      pointer-events: none;
    }
    #outsideTest {
      margin: 0 16px 16px 16px;
      width: 512px;
      height: 88px;
      background: repeating-linear-gradient(
        -45deg,
        #ff4d4d,
        #ff4d4d 12px,
        #4dff88 12px,
        #4dff88 24px
      );
      border: 3px solid #111;
      color: #111;
      font-size: 28px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
  <script>
    const __params = new URLSearchParams(window.location.search);
    if (__params.get("preserveDrawingBuffer") === "1") {
      const originalGetContext = HTMLCanvasElement.prototype.getContext;
      HTMLCanvasElement.prototype.getContext = function patchedGetContext(type, attrs) {
        if (type === "webgl" || type === "webgl2" || type === "experimental-webgl") {
          const merged = Object.assign({}, attrs || {}, { preserveDrawingBuffer: true });
          return originalGetContext.call(this, type, merged);
        }
        return originalGetContext.call(this, type, attrs);
      };
      window.__preservePatchEnabled = true;
    } else {
      window.__preservePatchEnabled = false;
    }
  </script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    window.CONTENT_PATH = params.get("contentPath") || "https://wow.zamimg.com/modelviewer/live/";
    window.__viewerScriptPath = `${window.CONTENT_PATH}viewer/viewer.min.js`;
    window.WOTLK_TO_RETAIL_DISPLAY_ID_API = undefined;
    window.__renderReady = false;
    window.__renderError = "";
    window.__renderStatus = "boot";
    window.__assetErrors = [];
  </script>
  <script>
    // Keep viewer script source aligned with CONTENT_PATH per library docs.
    document.write(`<script src="${window.__viewerScriptPath}"><\/script>`);
  </script>
</head>
<body>
  <div id="debugBanner">Spike page loaded</div>
  <div id="stage">
    <div id="model_3d"></div>
    <div id="overlayStatus">status: boot</div>
  </div>
  <div id="outsideTest">SPIKE OVERLAY TEST</div>
  <script type="module" src="./spike.js"></script>
</body>
</html>
